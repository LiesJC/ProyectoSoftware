{% extends "baseg.html" %}
{% block titulo %} VISIÓN ARTIFICIAL {% endblock %}

{% block cuerpo %}
<style>
.container { display: flex; gap: 20px; }
.controls { width: 300px; }
canvas { border: 2px solid #333; background: black; }
button, select { width: 100%; margin-bottom: 10px; padding: 8px; }
table { width: 100%; border-collapse: collapse; }
table, th, td { border: 1px solid #555; }
th, td { padding: 5px; text-align: center; }
</style>

<h2>Visión artificial en vivo</h2>

<div class="container">
    <canvas id="canvas" width="640" height="480"></canvas>

    <div class="controls">
        <button onclick="ws.send('start')">▶ Encender cámara</button>
        <button onclick="ws.send('stop')">⏹ Apagar cámara</button>

        <select onchange="ws.send(this.value)">
            <option value="raw">Cámara normal</option>
            <option value="yolo">Detección YOLO</option>
        </select>

        <h4>Objetos detectados</h4>
        <table>
            <thead>
                <tr><th>Objeto</th><th>Cantidad (%) Confianza</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const tableBody = document.getElementById("tableBody");

const protocol = location.protocol === "https:" ? "wss" : "ws";
const ws = new WebSocket(`${protocol}://${location.host}/ws/camara/`);

let lastFrame = null;
let drawing = false;
const img = new Image();

ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);

    if (msg.type === "frame") {
        lastFrame = msg.data;
        if (!drawing) requestAnimationFrame(drawFrame);
    }

    if (msg.type === "counts") {
        tableBody.innerHTML = "";
        for (const [obj, data] of Object.entries(msg.data)) {
            tableBody.innerHTML += `
                <tr>
                    <td>${obj}</td>
                    <td>${data.count} (${data.conf}%)</td>
                </tr>
            `;
        }
    }
};

function drawFrame() {
    if (!lastFrame) { drawing=false; return; }
    drawing = true;

    img.onload = () => {
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        drawing = false;
        if (lastFrame) requestAnimationFrame(drawFrame);
    };

    img.src = "data:image/jpeg;base64," + lastFrame;
    lastFrame = null;
}
</script>
{% endblock %}
