<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ver Cámara</title>
    <style>
        .camara-container {
            width: 400px;
            height: 300px;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            border: 3px solid #2196F3;
            margin: 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* llena el recuadro */
        }
    </style>
</head>
<body>

    <h2 style="text-align:center;">Vista de la Cámara</h2>
    <div class="camara-container">
        <video id="video" autoplay></video>
    </div>

    <script>
        const video = document.getElementById('video');

        async function iniciarCamara() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: true,
                    audio: false
                });

                video.srcObject = stream;
            } 
            catch (error) {
                alert("No se puede acceder a la cámara: " + error);
            }
        }
        iniciarCamara();
    </script>

</body>
</html>
