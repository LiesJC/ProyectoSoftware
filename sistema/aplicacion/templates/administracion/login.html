<html lang="es">

        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link rel="stylesheet" href="">
         <link

    <body class="bg-primary bg-gradient d-flex justify-content-center align-items-center min-vh-100">
         <div class="card shadow p-4 w-100" style="max-width:400px">
            <h1> INICIAR SESION </h2>
                {% if messages %}
                    <div class="alert alert-danger text-center py-2 mb-3">
                        {% for men in messages %}
                           {{ men }}
                        {% endfor%}
                    </div>    
                {% endif%}
            <form method='post'>
                {% csrf_token %}
                <div class="mb-3">
                    <!-- Vinculado mediante id_usuario -->
                    <label for="id_usuario" class="contrl-label fw-bold"> Usuario </label>
                    <input type="text" id="id_usuario" name="usuario" value="" class="form-control" required>
                </div> 
                <div class="mb-3">
                    <!-- Vinculado mediante id_clave -->
                    <label for="id_clave" class="contrl-label fw-bold"> Contraseña </label>
                    <input type="password" id="id_clave" name="clave" value="" class="form-control" required>
                </div>   
                <button type="submit" class="btn btn-primary"> ingresar </button>
            </form>
  
         </div>   
        
        <script src="" async defer></script>
    </body>
